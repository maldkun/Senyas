[phases.setup]
nixPkgs = ["python310"]
aptPkgs = ["libgl1", "libgl1-mesa-glx", "libgl1-mesa-dev", "libglib2.0-0", "mesa-utils", "libsm6", "libxext6", "libxrender1"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "python migrate_ai_mode.py && gunicorn main:app --workers 1 --threads 8 --timeout 120"
