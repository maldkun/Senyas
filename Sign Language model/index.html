<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filipino Sign Language Recognition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            background: #f5f7ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #e8ebff;
            border-color: #764ba2;
        }

        .upload-area input {
            display: none;
        }

        .upload-text {
            color: #667eea;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .upload-subtext {
            color: #999;
            font-size: 12px;
        }

        #preview {
            max-width: 100%;
            max-height: 300px;
            margin: 20px 0;
            border-radius: 8px;
            display: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .result {
            display: none;
            background: #f5f7ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
        }

        .result.success {
            background: #f0fdf4;
            border-left-color: #22c55e;
        }

        .result.error {
            background: #fef2f2;
            border-left-color: #ef4444;
        }

        .result-title {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .result.success .result-title {
            color: #22c55e;
        }

        .result.error .result-title {
            color: #ef4444;
        }

        .confidence {
            margin: 10px 0;
            font-size: 14px;
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin: 5px 0;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .top-5 {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(102, 126, 234, 0.2);
        }

        .top-5-title {
            font-weight: 600;
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .top-5-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0;
            font-size: 13px;
        }

        .top-5-bar {
            flex: 1;
            height: 6px;
            background: #e5e7eb;
            border-radius: 3px;
            margin: 0 10px;
            overflow: hidden;
        }

        .top-5-fill {
            height: 100%;
            background: #667eea;
        }

        .error-message {
            color: #ef4444;
        }

        .success-message {
            color: #22c55e;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🤟 Sign Language Recognition</h1>
            <p>Filipino Sign Language (FSL) Detection</p>
        </div>

        <div class="upload-area" id="uploadArea">
            <input type="file" id="imageInput" accept="image/*">
            <div class="upload-text">📸 Click or drag image here</div>
            <div class="upload-subtext">Supported: JPG, PNG, GIF, BMP (Max 16MB)</div>
        </div>

        <img id="preview" alt="Preview">

        <button id="predictBtn" disabled>Predict Sign Language</button>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>Analyzing image...</p>
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const predictBtn = document.getElementById('predictBtn');
        const loader = document.getElementById('loader');
        const result = document.getElementById('result');

        const API_URL = 'http://localhost:5000';

        // Upload area click
        uploadArea.addEventListener('click', () => imageInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                imageInput.files = files;
                handleImageSelect();
            }
        });

        // File input change
        imageInput.addEventListener('change', handleImageSelect);

        function handleImageSelect() {
            const file = imageInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    predictBtn.disabled = false;
                };
                reader.readAsDataURL(file);
            }
        }

        // Predict button
        predictBtn.addEventListener('click', predict);

        async function predict() {
            if (!imageInput.files[0]) {
                showError('Please select an image');
                return;
            }

            const formData = new FormData();
            formData.append('image', imageInput.files[0]);

            loader.style.display = 'block';
            result.style.display = 'none';

            try {
                const response = await fetch(`${API_URL}/predict`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.status === 'success') {
                    showSuccess(data);
                } else {
                    showError(data.error || 'Prediction failed');
                }
            } catch (error) {
                showError(`Error: ${error.message}`);
            } finally {
                loader.style.display = 'none';
            }
        }

        function showSuccess(data) {
            const confidence = Math.round(data.confidence * 100);

            let html = `
                <div class="result-title success-message">✓ ${data.prediction}</div>
                <div class="confidence">
                    Confidence: ${confidence}%
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: ${confidence}%"></div>
                    </div>
                </div>
            `;

            if (data.top_5_predictions && data.top_5_predictions.length > 1) {
                html += '<div class="top-5"><div class="top-5-title">Top 5 Predictions</div>';
                data.top_5_predictions.forEach((pred, idx) => {
                    const conf = Math.round(pred.confidence * 100);
                    html += `
                        <div class="top-5-item">
                            <span>${idx + 1}. ${pred.class}</span>
                            <div class="top-5-bar">
                                <div class="top-5-fill" style="width: ${conf}%"></div>
                            </div>
                            <span style="min-width: 40px; text-align: right;">${conf}%</span>
                        </div>
                    `;
                });
                html += '</div>';
            }

            result.innerHTML = html;
            result.classList.add('success');
            result.classList.remove('error');
            result.style.display = 'block';
        }

        function showError(message) {
            result.innerHTML = `
                <div class="result-title error-message">✗ Error</div>
                <div class="error-message">${message}</div>
            `;
            result.classList.add('error');
            result.classList.remove('success');
            result.style.display = 'block';
        }

        // Check API connection on load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_URL}/`);
                if (!response.ok) {
                    console.warn('API not running at ' + API_URL);
                }
            } catch (error) {
                console.warn('Could not connect to API. Make sure it is running.');
            }
        });
    </script>
</body>

</html>
