{% extends "landingpage.html" %}
{% block title %}Sign Up - Senyas{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h3>Create Account</h3>
            <p>Join Senyas and start learning FSL today.</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Enter email" required />
            </div>

            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" class="form-control" id="firstName" name="firstName" placeholder="Enter First Name"
                    required />
            </div>

            <div class="form-group">
                <label for="password1">Password</label>
                <input type="password" class="form-control" id="password1" name="password1" placeholder="Enter Password"
                    required />
            </div>

            <div class="form-group">
                <label for="password2">Confirm Password</label>
                <input type="password" class="form-control" id="password2" name="password2"
                    placeholder="Confirm Password" required />
            </div>

            <button type="submit" class="btn-primary">Sign Up</button>
            <p style="text-align: center; margin-top: 20px; font-size: 14px;">
                Already have an account? <a href="{{ url_for('auth.login') }}"
                    style="color: var(--primary-blue);">Login</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
